[project]
name = "mitorag-kg"
version = "1.0.0"
description = "Neo4j mitochondrial knowledge graph package boundary."
requires-python = ">=3.9"
dependencies = [
  "pydantic>=2.7.0",
]

[project.optional-dependencies]
neo4j = ["neo4j>=5.20.0"]
dev = [
  "pyright>=1.1.400",
  "pytest>=8.0.0",
  "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mitorag_kg"]
