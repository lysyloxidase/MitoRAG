[project]
name = "mitorag-ingestion"
version = "1.0.0"
description = "Scientific PDF parsing, metadata extraction, chunking, and watcher pipeline for MitoRAG."
requires-python = ">=3.9"
dependencies = [
  "pdfplumber>=0.11.0",
  "pydantic>=2.7.0",
  "watchdog>=4.0.0",
]

[project.optional-dependencies]
marker = ["marker-pdf>=1.6.0"]
dev = [
  "pyright>=1.1.400",
  "pytest>=8.0.0",
  "reportlab>=4.0.0",
  "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mitorag_ingest"]
