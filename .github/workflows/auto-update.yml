name: Daily auto-update

on:
  schedule:
    # 03:17 UTC daily — odd minute to avoid GitHub's top-of-hour cron contention.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: python -m pip install --quiet ruff

      - name: Refresh paper manifest from Europe PMC
        run: python scripts/refresh_paper_manifest.py

      - name: Auto-fix lint (non-fatal)
        run: ruff check . --fix --exit-zero

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name "lysyloxidase"
          git config user.email "lysyloxidase@users.noreply.github.com"
          git add -A
          git commit -m "chore: daily refresh ($(date -u +%Y-%m-%d))

          - Refreshed recent_papers.json from Europe PMC (top 50 latest OA papers)
          - Applied any auto-fixable ruff lint fixes"
          git push
